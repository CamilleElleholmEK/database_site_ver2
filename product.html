<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <a href="index.html">
        <h1 id="logo_type">Logo type</h1>
      </a>
      <nav>
        <a href="index.html">Categories</a>
        <a href="/">Brands</a>
        <a href="/">Seasons</a>
      </nav>
    </header>
    <main>
      <a class="back" href="productlist.html">Tilbage</a>
      <section class="detail_view">
        <div class="img_wrap wrap">
          <img
            src="https://kea-alt-del.dk/t7/images/webp/640/1535.webp"
            alt="Produkt billede"
          />
          <p class="hide">Udsolgt</p>
          <p class="sale">
            20
            <span>%</span>
          </p>
        </div>
        <div class="details">
          <p class="subtle">
            Hat
            <span> | </span>
            Puma
          </p>
          <h3>Navn på produkt 2</h3>
          <div class="price">
            <p class="price_before">
              DKK
              <span>250</span>
              ,-
            </p>
            <p class="price_after">
              DKK
              <span>200</span>
              ,-
            </p>
          </div>
          <div class="to_cart">
            <p class="btn">Add to Cart</p>
            <p class="stock">
              In stock:
              <span>4</span>
            </p>
          </div>
        </div>
      </section>
    </main>
    <footer>Footer?</footer>
  </body>
</html>
